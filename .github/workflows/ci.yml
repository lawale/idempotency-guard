name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Pack (verify packages build)
        run: |
          dotnet pack src/IdempotencyGuard/IdempotencyGuard.csproj --no-build --configuration Release --output ./artifacts
          dotnet pack src/IdempotencyGuard.AspNetCore/IdempotencyGuard.AspNetCore.csproj --no-build --configuration Release --output ./artifacts
          dotnet pack src/IdempotencyGuard.Redis/IdempotencyGuard.Redis.csproj --no-build --configuration Release --output ./artifacts
          dotnet pack src/IdempotencyGuard.PostgreSql/IdempotencyGuard.PostgreSql.csproj --no-build --configuration Release --output ./artifacts
          dotnet pack src/IdempotencyGuard.SqlServer/IdempotencyGuard.SqlServer.csproj --no-build --configuration Release --output ./artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg
          retention-days: 7
